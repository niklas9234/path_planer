[tool.black]
line-length = 88
target-version = ["py311"]

[tool.ruff]
line-length = 88
target-version = "py311"

# Keep tool runs clean in a monorepo
extend-exclude = [
    ".venv",
    "node_modules",
    "experiments/runs",
    "dist",
    "build",
    "__pycache__",
]

[tool.ruff.lint]
# E/W: PEP8 style, F: pyflakes
# I: import sorting, B: bugbear (common pitfalls), UP: pyupgrade (modern syntax)
select = ["E", "W", "F", "I", "B", "UP"]


